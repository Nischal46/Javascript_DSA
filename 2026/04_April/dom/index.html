<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <h3>Dom manipulation - Day 9</h3>

    <button class="button1">Connect to server</button>
    <button class="button2">Button 2</button>

    <script>

    let btn = document.querySelector(".button1");

    async function longPollingConcept(){
      const req = await fetch("http://localhost:3000", {
        method: "GET"
      });
      const response = await req.json();

      console.log("Logging of the response from the server -------", response);

      setInterval(() => {
        longPollingConcept();
      }, 5000);
    }

    btn.addEventListener("click", async (e) => {
      e.preventDefault();

      longPollingConcept();
    })
    </script>
  </body>
</html>
