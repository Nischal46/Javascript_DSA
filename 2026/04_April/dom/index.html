<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="css/style.css" rel="stylesheet">
  </head>
  <body>
    <h3>Dom manipulation</h3>

    <button class="button1">Connect to server</button>
    <button class="button2">Button 2</button>

    <div>
      <p>Button Tracking</p>

      <button>up</button>
      <button class="btndown">down</button>
      <button>left</button>
      <button>right</button>

    </div>

    <script>

    let btndown = document.querySelector(".btndown");

    window.addEventListener("keydown", (e) => {
      e.preventDefault();
      console.log("Event: ", e);
     // alert("Key down has been pressed");

      if(e.key === "ArrowDown"){
        console.log("You had pressed arrow down");
        btndown.style.background = "red";
      }
    })
    </script>
  </body>
</html>
